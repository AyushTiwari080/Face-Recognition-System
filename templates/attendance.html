<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Live Attendance - Face Recognition</title>

    <style>
        * {
            padding: 0;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-image: url('https://cutewallpaper.org/21/1920-x-1080-gif/1920x1080-Wallpapercartoon-Wallpapers-Driverlayer-Search-.gif');
            background-size: cover;
            margin-top: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 20px;
        }

        #video-container {
            position: relative;
            display: inline-block;
            border-radius: 10px;
            overflow: hidden;
        }

        #video {
            border-radius: 10px;
            width: 100%;
            max-width: 640px;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 10px;
        }

        .status-box {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 18px;
            margin-top: 10px;
            display: inline-block;
        }

        .status-box.detecting {
            background: #dc3545;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body>

    <div class="container">
        <a href="/" class="btn btn-secondary btn-back">← Back to Home</a>
        
        <h1 class="text-center" style="color: #0b4c61;">Live Attendance</h1>
        <p class="text-center">The system will automatically detect faces and mark attendance.</p>
        
        <div class="row mt-4">
            <div class="col-md-6 text-center">
                <h3>Camera Feed</h3>
                <div id="video-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="overlay"></canvas>
                </div>
                <div id="status" class="status-box detecting">Searching for faces...</div>
            </div>
            
            <div class="col-md-6">
                <h3>Today's Attendance</h3>
                <div style="max-height: 400px; overflow-y: auto;">
                    <table class="table table-striped" id="attendanceTable">
                        <thead>
                            <tr>
                                <th>S No</th>
                                <th>Name</th>
                                <th>ID</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceBody">
                            <!-- Attendance will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const statusDiv = document.getElementById('status');
        const attendanceBody = document.getElementById('attendanceBody');
        
        let stream = null;
        let isDetecting = false;
        let lastDetectionTime = 0;
        let attendanceData = [];

        // Start camera
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;
                    startDetection();
                };
            } catch (err) {
                alert('Error accessing camera: ' + err.message);
            }
        }

        // Start face detection loop
        function startDetection() {
            const ctx = overlay.getContext('2d');
            
            setInterval(async () => {
                if (!video.videoWidth) return;
                
                // Clear overlay
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                
                // Draw video frame to hidden canvas for processing
                const hiddenCanvas = document.createElement('canvas');
                hiddenCanvas.width = video.videoWidth;
                hiddenCanvas.height = video.videoHeight;
                const hiddenCtx = hiddenCanvas.getContext('2d');
                hiddenCtx.drawImage(video, 0, 0);
                
                const imageData = hiddenCanvas.toDataURL('image/jpeg');
                
                // Send frame to server for detection
                const now = Date.now();
                if (now - lastDetectionTime > 500) { // Limit requests
                    lastDetectionTime = now;
                    
                    try {
                        const response = await fetch('/detect_face', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ image: imageData })
                        });
                        
                        const result = await response.json();
                        
                        if (result.face_detected) {
                            statusDiv.classList.remove('detecting');
                            statusDiv.textContent = `Detected: ${result.name}`;
                            statusDiv.style.background = '#28a745';
                            
                            // Draw rectangle around face
                            ctx.strokeStyle = '#28a745';
                            ctx.lineWidth = 3;
                            ctx.strokeRect(result.x, result.y, result.w, result.h);
                            
                            // Draw name
                            ctx.fillStyle = '#28a745';
                            ctx.font = '20px Arial';
                            ctx.fillText(result.name, result.x, result.y - 10);
                            
                            // Refresh attendance
                            loadAttendance();
                        } else {
                            statusDiv.classList.add('detecting');
                            statusDiv.textContent = 'Searching for faces...';
                            statusDiv.style.background = '#dc3545';
                        }
                    } catch (err) {
                        console.error('Detection error:', err);
                    }
                }
            }, 100);
        }

        // Load attendance data
        async function loadAttendance() {
            try {
                const response = await fetch('/get_attendance');
                const data = await response.json();
                
                attendanceBody.innerHTML = '';
                data.attendance.forEach((item, index) => {
                    const row = `<tr>
                        <td>${index + 1}</td>
                        <td>${item.name}</td>
                        <td>${item.roll}</td>
                        <td>${item.time}</td>
                    </tr>`;
                    attendanceBody.innerHTML += row;
                });
            } catch (err) {
                console.error('Error loading attendance:', err);
            }
        }

        // Initial load
        loadAttendance();
        startCamera();
        
        // Refresh attendance every 5 seconds
        setInterval(loadAttendance, 5000);
    </script>
</body>
</html>
